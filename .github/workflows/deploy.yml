name: Deploy
on:
  push:
    branches: [main]
jobs:
  test:
    uses: ./.github/workflows/backend-test.yml

  deploy-backend:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build and deploy to Cloud Run
        run: |
          build_id=$(gcloud builds submit backend/ \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/ecotrack-api \
            --async \
            --format='value(id)' \
            --project ${{ secrets.GCP_PROJECT_ID }})
          echo "Cloud Build started: ${build_id}"

          if [ -z "${build_id}" ]; then
            echo "Cloud Build did not return a build id"
            exit 1
          fi

          for attempt in {1..120}; do
            build_status=$(gcloud builds describe "${build_id}" \
              --project ${{ secrets.GCP_PROJECT_ID }} \
              --format='value(status)')
            echo "Cloud Build status: ${build_status}"

            case "${build_status}" in
              SUCCESS)
                break
                ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                exit 1
                ;;
            esac

            sleep 5
          done

          if [ "${build_status}" != "SUCCESS" ]; then
            echo "Cloud Build did not finish before timeout"
            exit 1
          fi

          gcloud run deploy ecotrack-api \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/ecotrack-api \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --memory 512Mi \
            --max-instances 10 \
            --set-env-vars "^|^ENVIRONMENT=production|GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}|ALLOWED_ORIGINS=https://ecotrack-app-2026-1.web.app,https://ecotrack-app-2026-1.firebaseapp.com" \
            --project ${{ secrets.GCP_PROJECT_ID }}
      - name: Smoke test
        run: |
          sleep 10
          curl -f https://ecotrack-api-${{ secrets.GCP_HASH }}-uc.a.run.app/api/v1/health

  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npx prettier --check "src/**/*.{ts,tsx}"
      - name: Build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: npm run build
      - name: Test with coverage
        run: npm run test:coverage
      - name: npm audit
        run: npm audit --audit-level=moderate
      - uses: FirebaseExtended/action-hosting-deploy@v0.9.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.GCP_PROJECT_ID }}
          channelId: live
